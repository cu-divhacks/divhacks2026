<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CU Divhacks Puzzle</title>
  <style>
    :root {
      --bg: #2a1742;
      --panel: rgba(10, 10, 10, 0.72);
      --ink: #ffffff;
      --muted: #d9d4e6;
      --line: rgba(0, 255, 255, 0.32);
      --teal: #44c299;
      --pink: #fa97c2;
      --magenta: #f8119f;
      --cyan: #00ffff;
      --ok: #44c299;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Arial Black", "Trebuchet MS", "Impact", sans-serif;
      color: var(--ink);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(900px, 100%);
      background: var(--panel);
      border: 1px solid rgba(248, 17, 159, 0.22);
      border-radius: 0 8px 8px 8px;
      clip-path: polygon(0% 0%, 86% 0%, 100% 9%, 95% 30%, 100% 78%, 94% 100%, 8% 100%, 0% 90%, 0% 28%);
      padding: 18px;
      box-shadow: var(--shadow), inset 0 0 28px rgba(248, 17, 159, 0.08);
      backdrop-filter: blur(10px);
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2.5vw, 1.95rem);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.25);
    }

    .sub {
      color: var(--muted);
      margin-top: 4px;
      font-size: 0.95rem;
      font-family: "Trebuchet MS", sans-serif;
      font-weight: 700;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 14px;
      font-weight: 900;
      letter-spacing: 0.5px;
      cursor: pointer;
      color: #111;
      background: linear-gradient(120deg, var(--teal), #7ce3bf);
      transition: transform 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 0 18px rgba(68, 194, 153, 0.35);
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    button.secondary {
      background: linear-gradient(120deg, var(--pink), #ffd1e5);
      box-shadow: 0 0 18px rgba(250, 151, 194, 0.35);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 24px rgba(0, 255, 255, 0.35);
    }

    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 12px 0 18px;
      color: var(--muted);
      font-family: "Trebuchet MS", sans-serif;
      font-weight: 800;
    }

    .pill {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 7px 12px;
      box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.04);
    }

    .zone-title {
      margin: 0 0 8px;
      font-size: 0.95rem;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
      font-family: "Trebuchet MS", sans-serif;
    }

    .stage {
      position: relative;
      border-radius: 12px;
      background: rgba(14, 10, 22, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.15);
      overflow: hidden;
      touch-action: none;
      width: min(100%, 640px);
      aspect-ratio: 16 / 10;
      min-height: 250px;
      box-shadow: inset 0 0 25px rgba(248, 17, 159, 0.08), inset 0 0 30px rgba(68, 194, 153, 0.08);
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.45;
    }

    .tile {
      position: absolute;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.3);
      cursor: grab;
      user-select: none;
      transition: left 160ms ease, top 160ms ease, transform 120ms ease;
      background: rgba(0, 0, 0, 0.35);
      z-index: 2;
    }

    .tile.dragging {
      cursor: grabbing;
      transition: none;
      z-index: 99;
      transform: scale(1.04);
    }

    .message {
      margin-top: 14px;
      min-height: 1.5em;
      font-weight: 900;
      font-family: "Trebuchet MS", sans-serif;
      color: var(--ok);
      text-shadow: 0 0 10px rgba(68, 194, 153, 0.25);
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <div>
        <h1>Piece Together: CU Divhacks</h1>
        <div class="sub">Drag tiles around and complete the banner.</div>
      </div>
      <div class="controls">
        <button id="shuffleBtn" type="button">Shuffle</button>
        <button id="resetBtn" class="secondary" type="button">Reset Timer</button>
      </div>
    </section>

    <section class="stats">
      <div class="pill">Moves: <span id="moves">0</span></div>
      <div class="pill">Time: <span id="timer">00:00</span></div>
    </section>

    <h2 class="zone-title">Puzzle Board</h2>
    <div id="board" class="stage">
      <canvas id="boardGrid" class="grid-lines"></canvas>
    </div>

    <p id="message" class="message"></p>
  </main>

  <script>
    (function () {
      const COLS = 4;
      const ROWS = 3;
      const COUNT = COLS * ROWS;
      const GAP = 8;
      const BASE_BOARD_W = 640;
      const BASE_BOARD_H = 400;

      const boardEl = document.getElementById("board");
      const movesEl = document.getElementById("moves");
      const timerEl = document.getElementById("timer");
      const messageEl = document.getElementById("message");
      const shuffleBtn = document.getElementById("shuffleBtn");
      const resetBtn = document.getElementById("resetBtn");
      const boardGrid = document.getElementById("boardGrid");

      let boardW = BASE_BOARD_W;
      let boardH = BASE_BOARD_H;
      let tileW = 0;
      let tileH = 0;

      let moves = 0;
      let timerId = null;
      let startedAt = null;
      let gameWon = false;

      const slots = [];
      const pieces = [];
      let dragState = null;

      function updateBoardSize() {
        boardW = boardEl.clientWidth;
        boardH = boardEl.clientHeight;
        tileW = Math.floor((boardW - GAP * (COLS + 1)) / COLS);
        tileH = Math.floor((boardH - GAP * (ROWS + 1)) / ROWS);
      }

      function buildSlots() {
        slots.length = 0;
        for (let i = 0; i < COUNT; i++) {
          const row = Math.floor(i / COLS);
          const col = i % COLS;
          slots.push({
            id: "slot-" + i,
            index: i,
            x: GAP + col * (tileW + GAP),
            y: GAP + row * (tileH + GAP),
            pieceId: null
          });
        }
      }

      function drawGrid() {
        boardGrid.width = boardW;
        boardGrid.height = boardH;
        const ctx = boardGrid.getContext("2d");
        ctx.clearRect(0, 0, boardW, boardH);
        ctx.strokeStyle = "rgba(0,255,255,0.28)";
        ctx.lineWidth = 1;
        for (const slot of slots) {
          ctx.strokeRect(slot.x, slot.y, tileW, tileH);
        }
      }

      function makeBannerCanvas() {
        const c = document.createElement("canvas");
        c.width = COLS * tileW;
        c.height = ROWS * tileH;
        const ctx = c.getContext("2d");

        const grad = ctx.createLinearGradient(0, 0, c.width, c.height);
        grad.addColorStop(0, "#44c299");
        grad.addColorStop(0.55, "#f8119f");
        grad.addColorStop(1, "#fa97c2");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, c.width, c.height);

        for (let i = 0; i < 18; i++) {
          ctx.fillStyle = i % 2 === 0 ? "rgba(255,255,255,0.09)" : "rgba(255,255,255,0.05)";
          ctx.beginPath();
          ctx.arc(Math.random() * c.width, Math.random() * c.height, 8 + Math.random() * 28, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.font = "900 " + Math.floor(tileH * 0.72) + "px Arial Black, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("CU DIVHACKS", c.width / 2 + 2, c.height / 2 + 3);

        ctx.fillStyle = "#ffffff";
        ctx.fillText("CU DIVHACKS", c.width / 2, c.height / 2);

        ctx.strokeStyle = "rgba(255,255,255,0.55)";
        ctx.lineWidth = 2;
        ctx.strokeRect(3, 3, c.width - 6, c.height - 6);

        return c;
      }

      function clearBoardTiles() {
        const existing = boardEl.querySelectorAll(".tile");
        existing.forEach((el) => el.remove());
      }

      function createPieces() {
        clearBoardTiles();
        const source = makeBannerCanvas();
        const sourceCtx = source.getContext("2d");

        pieces.length = 0;
        for (let i = 0; i < COUNT; i++) {
          const r = Math.floor(i / COLS);
          const c = i % COLS;
          const tileCanvas = document.createElement("canvas");
          tileCanvas.width = tileW;
          tileCanvas.height = tileH;
          const tctx = tileCanvas.getContext("2d");
          tctx.drawImage(sourceCtx.canvas, c * tileW, r * tileH, tileW, tileH, 0, 0, tileW, tileH);

          const el = document.createElement("div");
          el.className = "tile";
          el.style.width = tileW + "px";
          el.style.height = tileH + "px";
          el.dataset.id = String(i);
          el.appendChild(tileCanvas);
          boardEl.appendChild(el);

          pieces.push({
            id: i,
            correctSlotIndex: i,
            slotIndex: null,
            el
          });
        }
      }

      function placePiece(piece, slotIndex) {
        const slot = slots[slotIndex];
        slot.pieceId = piece.id;
        piece.slotIndex = slotIndex;
        piece.el.style.left = slot.x + "px";
        piece.el.style.top = slot.y + "px";
      }

      function startTimerIfNeeded() {
        if (startedAt || gameWon) return;
        startedAt = Date.now();
        timerId = setInterval(() => {
          const secs = Math.floor((Date.now() - startedAt) / 1000);
          const mm = String(Math.floor(secs / 60)).padStart(2, "0");
          const ss = String(secs % 60).padStart(2, "0");
          timerEl.textContent = mm + ":" + ss;
        }, 250);
      }

      function resetTimer() {
        if (timerId) {
          clearInterval(timerId);
          timerId = null;
        }
        startedAt = null;
        timerEl.textContent = "00:00";
      }

      function shuffle() {
        gameWon = false;
        messageEl.textContent = "";
        resetTimer();
        moves = 0;
        movesEl.textContent = "0";

        for (const slot of slots) {
          slot.pieceId = null;
        }

        const order = Array.from({ length: COUNT }, (_, i) => i).sort(() => Math.random() - 0.5);
        pieces.forEach((piece, idx) => {
          placePiece(piece, order[idx]);
        });
      }

      function checkWin() {
        const won = pieces.every((piece) => piece.slotIndex === piece.correctSlotIndex);
        if (!won || gameWon) return;

        gameWon = true;
        if (timerId) clearInterval(timerId);
        messageEl.textContent = "Solved in " + timerEl.textContent + " with " + moves + " moves. Nice!";
      }

      function nearestSlotIndex(clientX, clientY) {
        const rect = boardEl.getBoundingClientRect();
        const localX = clientX - rect.left;
        const localY = clientY - rect.top;
        let bestIndex = -1;
        let bestDist = Infinity;

        for (const slot of slots) {
          const cx = slot.x + tileW / 2;
          const cy = slot.y + tileH / 2;
          const d = Math.hypot(localX - cx, localY - cy);
          if (d < bestDist) {
            bestDist = d;
            bestIndex = slot.index;
          }
        }

        if (bestIndex < 0) return null;
        return bestDist <= Math.max(tileW, tileH) * 0.7 ? bestIndex : null;
      }

      function finalizeDrop(e, cancelOnly) {
        if (!dragState) return;
        const drag = dragState;
        dragState = null;

        drag.piece.el.classList.remove("dragging");
        if (drag.pointerId !== null && drag.piece.el.hasPointerCapture(drag.pointerId)) {
          drag.piece.el.releasePointerCapture(drag.pointerId);
        }

        const fromSlot = slots[drag.fromSlotIndex];
        if (cancelOnly) {
          placePiece(drag.piece, drag.fromSlotIndex);
          return;
        }

        const targetSlotIndex = nearestSlotIndex(e.clientX, e.clientY);
        if (targetSlotIndex === null || targetSlotIndex === drag.fromSlotIndex) {
          placePiece(drag.piece, drag.fromSlotIndex);
          return;
        }

        const targetSlot = slots[targetSlotIndex];
        const occupyingId = targetSlot.pieceId;
        fromSlot.pieceId = null;

        if (occupyingId !== null) {
          const other = pieces.find((p) => p.id === occupyingId);
          placePiece(other, drag.fromSlotIndex);
        }

        placePiece(drag.piece, targetSlotIndex);
        moves += 1;
        movesEl.textContent = String(moves);
        checkWin();
      }

      function wireDragging(piece) {
        piece.el.addEventListener("pointerdown", (e) => {
          if (gameWon) return;
          startTimerIfNeeded();

          const rect = boardEl.getBoundingClientRect();
          const pieceRect = piece.el.getBoundingClientRect();

          dragState = {
            piece,
            fromSlotIndex: piece.slotIndex,
            pointerId: e.pointerId,
            offsetX: e.clientX - pieceRect.left,
            offsetY: e.clientY - pieceRect.top
          };

          piece.el.classList.add("dragging");
          piece.el.setPointerCapture(e.pointerId);

          const left = e.clientX - rect.left - dragState.offsetX;
          const top = e.clientY - rect.top - dragState.offsetY;
          piece.el.style.left = left + "px";
          piece.el.style.top = top + "px";
        });

        piece.el.addEventListener("pointermove", (e) => {
          if (!dragState || dragState.piece.id !== piece.id) return;
          const rect = boardEl.getBoundingClientRect();
          const left = e.clientX - rect.left - dragState.offsetX;
          const top = e.clientY - rect.top - dragState.offsetY;
          piece.el.style.left = left + "px";
          piece.el.style.top = top + "px";
        });

        piece.el.addEventListener("pointerup", (e) => {
          if (!dragState || dragState.piece.id !== piece.id) return;
          finalizeDrop(e, false);
        });

        piece.el.addEventListener("pointercancel", (e) => {
          if (!dragState || dragState.piece.id !== piece.id) return;
          finalizeDrop(e, true);
        });

        piece.el.addEventListener("lostpointercapture", (e) => {
          if (!dragState || dragState.piece.id !== piece.id) return;
          finalizeDrop(e, true);
        });
      }

      function layoutAndRegenerate() {
        updateBoardSize();
        buildSlots();
        drawGrid();
        createPieces();
        pieces.forEach(wireDragging);
        shuffle();
      }

      shuffleBtn.addEventListener("click", shuffle);
      resetBtn.addEventListener("click", () => {
        resetTimer();
        moves = 0;
        movesEl.textContent = "0";
        messageEl.textContent = "Timer and move count reset.";
      });

      window.addEventListener("resize", () => {
        layoutAndRegenerate();
      });

      layoutAndRegenerate();
    })();
  </script>
</body>
</html>
